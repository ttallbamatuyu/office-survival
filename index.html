<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="나의 오피스 생존 유형 테스트">
    <meta property="og:description" content="12개의 질문으로 알아보는 나의 직장 생활 캐릭터는? 지금 바로 테스트해보세요!">
    <!-- ⚠️ 아래 content 주소를 대표님이 원하는 썸네일 이미지 주소로 변경하세요 -->
    <meta property="og:image" content="https://img.icons8.com/color/256/conference-call.png"> 
    
    <title>나의 오피스 생존 유형 테스트</title>
    
    <!-- Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 부드러운 화면 전환 애니메이션 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 스크롤바 숨기기 (모바일 앱처럼 깔끔하게) */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <!-- 모바일 화면에 최적화된 메인 앱 컨테이너 -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden relative min-h-[600px] flex flex-col">
        
        <!-- 메인 콘텐츠가 바뀌는 영역 -->
        <div id="content-area" class="flex-1 p-6 flex flex-col fade-in overflow-y-auto">
            <!-- 자바스크립트를 통해 화면이 그려집니다 -->
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 데이터 정의 (질문과 결과)
        // ==========================================
        
        // 12개의 질문 리스트 (각 질문에 어울리는 고유 이미지 주소)
        const questions = [
            { q: "출근 첫날, 점심시간! 나의 행동은?", img: "https://img.icons8.com/color/256/bento.png", a: "팀원들에게 다가가 밥을 같이 먹자고 한다.", b: "누군가 부를 때까지 자리를 지키며 눈치를 본다.", typeA: "E", typeB: "I" },
            { q: "주말에 회사 워크샵을 간다고 한다. 내 심정은?", img: "https://img.icons8.com/color/256/bus.png", a: "오! 다른 팀 사람들과도 친해질 기회다!", b: "아... 주말은 집에서 쉬어야 하는데 기가 빨린다.", typeA: "E", typeB: "I" },
            { q: "업무 중 스트레스가 쌓였을 때 나는?", img: "https://img.icons8.com/color/256/cafe.png", a: "동료들과 티타임을 가지며 수다로 푼다.", b: "혼자 조용한 곳에서 음악을 들으며 쉰다.", typeA: "E", typeB: "I" },
            
            { q: "새로운 프로젝트를 맡게 되었다. 먼저 할 일은?", img: "https://img.icons8.com/color/256/idea.png", a: "기존 레퍼런스와 과거 데이터를 찾아본다.", b: "남들이 안 해본 새롭고 기발한 아이디어를 구상한다.", typeA: "S", typeB: "N" },
            { q: "회의 중 상사가 뜬구름 잡는 소리를 한다면?", img: "https://img.icons8.com/color/256/confused.png", a: "'그래서 구체적으로 뭘 하라는 거지?' 생각한다.", b: "'오, 저렇게도 생각할 수 있구나' 상상의 나래를 편다.", typeA: "S", typeB: "N" },
            { q: "업무 메뉴얼을 읽을 때 나는?", img: "https://img.icons8.com/color/256/book.png", a: "순서대로 꼼꼼히 읽으며 그대로 따라 한다.", b: "대충 훑어보고 감으로 일단 부딪혀 본다.", typeA: "S", typeB: "N" },
            
            { q: "동기가 업무 실수로 상사에게 크게 혼나고 우울해한다.", img: "https://img.icons8.com/color/256/crying.png", a: "\"어떤 부분에서 실수한 거야? 다음엔 이렇게 해봐.\"", b: "\"진짜 속상하겠다. 오늘 끝나고 술 한잔 할래?\"", typeA: "T", typeB: "F" },
            { q: "나의 성과에 대해 피드백을 받을 때, 더 듣기 좋은 말은?", img: "https://img.icons8.com/color/256/good-quality.png", a: "\"일 처리 능력이 아주 뛰어나고 효율적이네요.\"", b: "\"팀을 위해 헌신하고 노력해 줘서 정말 고마워요.\"", typeA: "T", typeB: "F" },
            { q: "팀원이 기한을 못 지켜 내 업무까지 밀렸다.", img: "https://img.icons8.com/color/256/calendar.png", a: "일정 지연 사유를 묻고, 언제까지 가능한지 재확인한다.", b: "무슨 일 있나 걱정하며, 내가 도울 수 있는 부분을 찾는다.", typeA: "T", typeB: "F" },
            
            { q: "상사가 엄청난 분량의 업무를 던져주었다.", img: "https://img.icons8.com/color/256/overtime.png", a: "일단 엑셀을 켜서 리스트업하고 우선순위를 짠다.", b: "아... 야근 확정이네. 일단 손에 잡히는 것부터 한다.", typeA: "J", typeB: "P" },
            { q: "내일은 중요한 발표 날이다. 퇴근 전 나의 모습은?", img: "https://img.icons8.com/color/256/presentation.png", a: "발표 대본과 예상 질문까지 완벽하게 정리해 둔다.", b: "대충 틀은 잡았으니 내일 아침의 나에게 맡긴다.", typeA: "J", typeB: "P" },
            { q: "오후에 갑자기 예정에 없던 회의가 잡혔다.", img: "https://img.icons8.com/color/256/meeting.png", a: "오늘 계획해 둔 내 업무 루틴이 깨져서 스트레스를 받는다.", b: "뭐 회의 끝나고 남는 시간에 하면 되지, 하고 넘긴다.", typeA: "J", typeB: "P" }
        ];

        // 16가지 MBTI 결과 맞춤 이미지 및 쿠팡 파트너스 세팅
        // ⚠️ link 부분의 'https://coupang.com'을 대표님의 실제 쿠팡 파트너스 상품 링크로 꼭 변경하세요!
        const results = {
            "ESTJ": { title: "호통치는 불도저 (ESTJ)", desc: "체계적이고 규칙을 중시하는 워커홀릭 리더입니다. 꼰대 소리를 들을 수도 있지만 일 하나는 확실하죠!", color: "text-red-500", img: "https://img.icons8.com/color/256/megaphone.png", item: "강력한 피로회복! 고함량 비타민B", link: "https://link.coupang.com/a/ecZ5pm" },
            "ENTJ": { title: "전략적 야망가 (ENTJ)", desc: "목표 달성을 위해 거침없이 직진하는 리더! 비효율을 극혐하며 승진에 가장 유리한 타입입니다.", color: "text-red-600", img: "https://img.icons8.com/color/256/crown.png", item: "시간 관리의 끝판왕, 최고급 플래너", link: "https://link.coupang.com/a/ecZ6Oq" },
            "ESFJ": { title: "다정다감 인싸 (ESFJ)", desc: "사내 평판 1위! 동료들을 챙기고 조직 분위기를 띄우는 없어서는 안 될 분위기 메이커입니다.", color: "text-yellow-500", img: "https://img.icons8.com/color/256/conference-call.png", item: "탕비실 인기 스타, 고급 다과 세트", link: "https://link.coupang.com/a/ecZ75A" },
            "ENFJ": { title: "따뜻한 멘토 (ENFJ)", desc: "타인의 성장을 돕는 것을 좋아하는 이상주의자! 동료들에게 긍정적인 에너지를 뿜어냅니다.", color: "text-yellow-400", img: "https://img.icons8.com/color/256/sun.png", item: "목관리를 위한 휴대용 가습기", link: "https://link.coupang.com/a/ecZ9vC" },
            "ESTP": { title: "위기 대처 만렙 (ESTP)", desc: "순발력이 뛰어나고 실전에 강한 타짜! 갑작스러운 이슈 상황에서 가장 빛을 발합니다.", color: "text-orange-500", img: "https://img.icons8.com/color/256/flash-on.png", item: "언제든 달릴 준비! 편안한 사무실 슬리퍼", link: "https://link.coupang.com/a/ec0ahK" },
            "ENTP": { title: "아이디어 뱅크 (ENTP)", desc: "회의 시간의 폭주기관차! 기발한 아이디어는 넘치지만 마무리가 조금 약할 수 있어요.", color: "text-purple-500", img: "https://img.icons8.com/color/256/idea.png", item: "아이디어 번뜩! 무소음 기계식 키보드", link: "https://link.coupang.com/a/ec0a8I" },
            "ESFP": { title: "자유로운 영혼 (ESFP)", desc: "사무실에 갇혀 있는 걸 가장 힘들어하는 타입! 하지만 텐션이 높아 모두가 좋아합니다.", color: "text-pink-500", img: "https://img.icons8.com/color/256/confetti.png", item: "데스크테리어 완성! 귀여운 피규어 방향제", link: "https://link.coupang.com/a/ec0b09" },
            "ENFP": { title: "열정 만수르 (ENFP)", desc: "새로운 프로젝트를 사랑하는 스파크형! 관심 있는 일에는 엄청난 열정을 보입니다.", color: "text-green-400", img: "https://img.icons8.com/color/256/rocket.png", item: "지루함 타파! 신기한 책상 장난감", link: "https://link.coupang.com/a/ec0b09" },
            "ISTJ": { title: "소리 없는 에이스 (ISTJ)", desc: "FM 그 자체! 묵묵하고 정확하게 자신의 일을 완벽히 해내는 회사에서 가장 신뢰받는 타입입니다.", color: "text-blue-600", img: "https://img.icons8.com/color/256/todo-list.png", item: "정리의 달인, 데스크 오거나이저", link: "https://link.coupang.com/a/ec0dx6" },
            "INTJ": { title: "차가운 전략가 (INTJ)", desc: "남들과 다른 큰 그림을 그리는 고독한 천재! 혼자 일할 때 가장 효율이 높습니다.", color: "text-indigo-600", img: "https://img.icons8.com/color/256/brain.png", item: "완벽한 차단, 노이즈 캔슬링 헤드폰", link: "https://link.coupang.com/a/ec0d9H" },
            "ISFJ": { title: "헌신적인 천사 (ISFJ)", desc: "뒤에서 묵묵히 팀원들을 서포트하는 숨은 공로자! 거절을 잘 못해서 일이 몰릴 수 있어요.", color: "text-blue-400", img: "https://img.icons8.com/color/256/angel.png", item: "어깨 피로 싹! 미니 마사지기", link: "https://link.coupang.com/a/ec0fu9" },
            "INFJ": { title: "통찰력 있는 관찰자 (INFJ)", desc: "조용히 사람들을 파악하고 핵심을 꿰뚫어 봅니다. 완벽주의 성향이 있어 속으로 스트레스를 받아요.", color: "text-teal-500", img: "https://img.icons8.com/color/256/crystal-ball.png", item: "마음의 평화, 허브티 세트", link: "https://link.coupang.com/a/ec0f4Y" },
            "ISTP": { title: "마이웨이 해결사 (ISTP)", desc: "필요한 말만 하고 할 일만 딱 하는 쿨가이! 툴(도구)을 다루는 데 천부적인 재능이 있습니다.", color: "text-gray-600", img: "https://img.icons8.com/color/256/toolbox.png", item: "손목 보호 필수! 인체공학 버티컬 마우스", link: "https://link.coupang.com/a/ec0hbL" },
            "INTP": { title: "게으른 천재 (INTP)", desc: "논리와 분석을 사랑하는 사색가! 반복되는 단순 업무를 가장 싫어하고 비효율을 못 견딥니다.", color: "text-gray-500", img: "https://img.icons8.com/color/256/rubiks-cube.png", item: "최고의 효율, 듀얼 모니터 암", link: "https://link.coupang.com/a/ec0hP6" },
            "ISFP": { title: "평화주의자 (ISFP)", desc: "갈등을 싫어하고 물 흐르듯 직장 생활을 하는 타입. 조용하지만 자기만의 예술적 감각이 있습니다.", color: "text-green-500", img: "https://img.icons8.com/color/256/paint-palette.png", item: "나만의 힐링존, 책상용 미니 식물", link: "https://link.coupang.com/a/ec0ir1" },
            "INFP": { title: "유리멘탈 몽상가 (INFP)", desc: "속에 수많은 생각과 감정이 휘몰아치는 타입. 상처를 잘 받지만 의미 있는 일에는 누구보다 진심입니다.", color: "text-emerald-400", img: "https://img.icons8.com/color/256/cloud.png", item: "감성 듬뿍, 포근한 낮잠 쿠션", link: "https://link.coupang.com/a/ec0iW8" }
        };

        // ==========================================
        // 2. 상태 관리 (현재 진행 상황)
        // ==========================================
        let currentQuestionIndex = 0;
        let mbtiScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        const contentArea = document.getElementById('content-area');

        // ==========================================
        // 3. 화면 렌더링 함수
        // ==========================================

        // [화면 1] 시작 화면
        function renderStartScreen() {
            contentArea.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <span class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded-full mb-4">MBTI 직장인 테스트</span>
                    <h1 class="text-3xl font-extrabold text-gray-900 mb-4 leading-tight">나의 오피스<br>생존 유형 테스트</h1>
                    <p class="text-gray-500 mb-8">나는 회사에서 어떤 캐릭터일까?<br>12개의 질문으로 알아보는 나의 직장 생활!</p>
                    <button onclick="startTest()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition duration-200 shadow-lg transform hover:-translate-y-1">
                        테스트 시작하기
                    </button>
                    <p class="text-xs text-gray-400 mt-4">현재 145,291명이 참여했습니다.</p>
                </div>
            `;
        }

        // [화면 2] 질문 화면
        function renderQuestionScreen() {
            const q = questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / questions.length) * 100;

            contentArea.innerHTML = `
                <div class="flex-1 flex flex-col fade-in">
                    <!-- 진행률 바 -->
                    <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                        <div class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="text-indigo-600 font-bold mb-2">Q${currentQuestionIndex + 1}.</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 leading-relaxed">${q.q}</h2>
                    
                    <!-- 질문 관련 썸네일 이미지 영역 -->
                    <div class="flex-1 flex items-center justify-center mb-6">
                        <div class="w-32 h-32 bg-gray-50 rounded-full flex items-center justify-center overflow-hidden">
                            <img src="${q.img}" alt="질문 이미지" class="w-24 h-24 object-contain opacity-80" onerror="this.style.display='none'">
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-4 mt-auto">
                        <button onclick="answerQuestion('${q.typeA}')" class="w-full text-left bg-gray-50 hover:bg-indigo-50 border-2 border-gray-100 hover:border-indigo-300 text-gray-700 font-medium py-4 px-5 rounded-xl transition duration-200">
                            A. ${q.a}
                        </button>
                        <button onclick="answerQuestion('${q.typeB}')" class="w-full text-left bg-gray-50 hover:bg-indigo-50 border-2 border-gray-100 hover:border-indigo-300 text-gray-700 font-medium py-4 px-5 rounded-xl transition duration-200">
                            B. ${q.b}
                        </button>
                    </div>
                </div>
            `;
        }

        // [화면 3] 결과 로딩 화면 (기대감 증폭)
        function renderLoadingScreen() {
            contentArea.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-6"></div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">나의 생존 유형 분석 중...</h2>
                    <p class="text-gray-500">잠시만 기다려주세요!</p>
                </div>
            `;
            // 2.5초 후 결과 화면으로 자동 이동
            setTimeout(renderResultScreen, 2500);
        }

        // [화면 4] 최종 결과 화면 (수익화 핵심 페이지)
        function renderResultScreen() {
            // MBTI 결과 계산 로직
            let finalMBTI = "";
            finalMBTI += mbtiScores.E >= mbtiScores.I ? "E" : "I";
            finalMBTI += mbtiScores.S >= mbtiScores.N ? "S" : "N";
            finalMBTI += mbtiScores.T >= mbtiScores.F ? "T" : "F";
            finalMBTI += mbtiScores.J >= mbtiScores.P ? "J" : "P";

            const result = results[finalMBTI];

            contentArea.innerHTML = `
                <div class="flex-1 flex flex-col items-center text-center fade-in pb-4">
                    <h2 class="text-gray-500 font-medium mb-2">당신의 오피스 생존 유형은?</h2>
                    <h1 class="text-2xl font-extrabold ${result.color} mb-6">${result.title}</h1>
                    
                    <div class="w-32 h-32 bg-gray-100 rounded-full flex items-center justify-center mb-6 overflow-hidden shadow-inner">
                        <img src="${result.img}" alt="결과 이미지" class="w-20 h-20 opacity-80" onerror="this.style.display='none'">
                    </div>
                    
                    <p class="text-gray-700 mb-6 leading-relaxed bg-gray-50 p-4 rounded-xl border border-gray-100 text-sm">
                        ${result.desc}
                    </p>
                    
                    <!-- 💰 1. 쿠팡 파트너스 추천 상품 영역 -->
                    <div class="w-full bg-blue-50 border border-blue-200 rounded-xl p-4 mb-3 cursor-pointer hover:bg-blue-100 transition transform hover:-translate-y-1 shadow-sm" onclick="window.open('${result.link}', '_blank')">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center text-2xl shadow-sm">
                                🎁
                            </div>
                            <div class="text-left flex-1">
                                <p class="text-[11px] text-blue-600 font-bold mb-1">이 유형에게 찰떡인 생존템 추천!</p>
                                <p class="text-sm text-gray-800 font-medium break-keep">${result.item}</p>
                            </div>
                            <div class="text-blue-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                        <p class="text-[9px] text-gray-400 mt-2 text-right">※ 파트너스 활동을 통해 일정액의 수수료를 제공받을 수 있습니다.</p>
                    </div>

                    <!-- 💰 2. 개발자 후원 (카카오페이 송금 링크 등 활용) -->
                    <!-- ⚠️ window.open 안의 주소를 본인의 카카오페이 송금 링크로 변경하세요! -->
                    <button onclick="window.open('https://qr.kakaopay.com/FGWZY30d3', '_blank')" class="w-full bg-white hover:bg-[#FEE500] border border-gray-200 hover:border-[#FEE500] text-gray-600 hover:text-gray-900 font-bold py-2.5 rounded-xl transition duration-200 mb-6 flex items-center justify-center gap-2 text-sm shadow-sm">
                        ☕ 재밌게 즐기셨다면? 카카오페이로 커피 한 잔 후원하기
                    </button>

                    <!-- 하단 액션 버튼 -->
                    <div class="w-full flex gap-3 mt-auto">
                        <button onclick="shareTest()" class="flex-1 bg-[#FEE500] hover:bg-[#F4DC00] text-[#391B1B] font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-sm">
                            <span>카카오톡 공유</span>
                        </button>
                        <button onclick="restartTest()" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-sm">
                            다시 하기
                        </button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 4. 액션 이벤트 함수
        // ==========================================
        function startTest() {
            currentQuestionIndex = 0;
            mbtiScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            renderQuestionScreen();
        }

        function answerQuestion(type) {
            mbtiScores[type]++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                renderQuestionScreen();
            } else {
                renderLoadingScreen();
            }
        }

        function restartTest() {
            renderStartScreen();
        }

        function shareTest() {
            // 실제 배포된 후 본인의 사이트 주소로 변경하세요!
            const myUrl = window.location.href; 
            
            navigator.clipboard.writeText(myUrl).then(() => {
                alert("테스트 링크가 복사되었습니다! 친구들에게 공유해보세요.");
            }).catch(() => {
                // 모바일 브라우저 호환성을 위한 fallback
                prompt("아래 링크를 복사해서 친구들에게 공유하세요!", myUrl);
            });
        }

        // 프로그램 시작 시 첫 화면 렌더링
        renderStartScreen();
    </script>
</body>
</html>
